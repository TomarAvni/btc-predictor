app:
  name: "BTC Price Predictor"
  log_level: "INFO"
  log_file: "logs/btc_predictor.log"
  predictions_file: "predictions.log"

data:
  base_path: "data"
  price_path: "data/price"
  cache_path: "data/cache"
  models_path: "data/validation/models"
  history_path: "data/history"
  performance_path: "data/performance"

schedule:
  fast_minutes: 15
  medium_minutes: 60
  slow_minutes: 360
  daily_minutes: 1440

exchanges:
  primary:
    id: "binance"
    symbol: "BTC/USDT"
    start_date: "2017-08-17"
  secondary:
    id: "bitstamp"
    symbol: "BTC/USD"
    start_date: "2013-09-01"

halving:
  events:
    - date: "2012-11-28"
      block: 210000
      reward_after: 25.0
    - date: "2016-07-09"
      block: 420000
      reward_after: 12.5
    - date: "2020-05-11"
      block: 630000
      reward_after: 6.25
    - date: "2024-04-19"
      block: 840000
      reward_after: 3.125
  avg_cycle_days: 1460

prediction:
  # The authoritative horizon set lives in code: src/horizons.py
  # (continuous 6h-step curve 6h..168h == 7d, plus a 30d long-range point).
  # The entries below are informational; code imports from src.horizons.
  horizon_curve:
    step_hours: 6
    max_hours: 168        # 168h == 7 days
  long_range:
    - label: "30d"
      hours: 720

collectors:
  twitter:
    # API key is read from the TWITTERAPI_KEY env var (never stored here).
    # When the key is absent the collector runs in MOCK MODE using
    # tests/fixtures/sample_tweets.json so the whole pipeline works offline.
    api_base: "https://api.twitterapi.io"
    cadence_minutes: 10          # ingestion / forecast cadence
    max_tweets_per_run: 1000     # per-run pull cap
    monthly_tweet_cap: 4320000   # hard budget guard (~10-min cadence, nano profile)
    keywords: ["$BTC", "#Bitcoin", "bitcoin"]
    whitelist_handles:           # trusted accounts, boosted weight
      - "BitcoinMagazine"
      - "saylor"
      - "WatcherGuru"
      - "cointelegraph"
      - "DocumentingBTC"
    min_followers: 500           # spam/bot floor
    languages: ["en"]
    whitelist_weight: 3.0        # influence multiplier for whitelist handles
  llm_reader:
    # LLM key read from LLM_API_KEY env var; absent -> deterministic mock reader.
    model: "gpt-5-nano"
    api_base: "https://api.openai.com/v1"
    batch_size: 40
    min_relevance: 0.15          # drop off-topic tweets from aggregation

cache:
  default_ttl_minutes: 60
  max_size_mb: 500

logging:
  level: "INFO"
  console: true
  file: "logs/btc_predictor.log"
  format: "%(asctime)s | %(levelname)-8s | %(name)s | %(message)s"
