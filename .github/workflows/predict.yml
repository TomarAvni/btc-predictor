name: Predict

on:
  schedule:
    # Offset from :00/:30 -- GitHub drops/delays schedules at the top of the hour
    # under load, which was leaving the predictor idle for hours.
    - cron: '7,37 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: predict-master
  cancel-in-progress: true

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync to latest master
        run: |
          git fetch origin master
          git reset --hard origin/master

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install
        run: pip install -r requirements.txt

      - name: Check trained models
        run: |
          if [ ! -d "data/validation/models" ] || [ -z "$(find data/validation/models -type f -print -quit 2>/dev/null)" ]; then
            echo "::warning::No trained models in data/validation/models/ -- running predict with heuristics only"
            echo "Run Download then Train (or workflow_dispatch Train) to produce ML models."
          else
            echo "Trained model artifacts found in data/validation/models/"
          fi

      - name: Predict and trade
        env:
          BTC_PRICE_PRIMARY_EXCHANGE: bitstamp
        run: python trade.py --live-tick

      - name: Score mature predictions
        run: python score_predictions.py

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git restore data/cache || true
          git add predictions.log data/predictions/ data/performance/ data/price/ data/trading/
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: prediction run [skip ci]"
          # Resilient push: re-sync and retry so concurrent runs / data-file
          # conflicts self-heal instead of failing the whole prediction run.
          for attempt in 1 2 3 4 5; do
            git fetch origin master || { echo "Fetch failed; retrying (attempt $attempt)."; sleep $((RANDOM % 5 + 3)); continue; }
            if ! git rebase -X theirs origin/master; then
              echo "Rebase hit an unexpected state; aborting and retrying (attempt $attempt)."
              git rebase --abort || true
              sleep $((RANDOM % 5 + 3))
              continue
            fi
            if git push origin HEAD:master; then
              echo "Pushed successfully on attempt $attempt."
              exit 0
            fi
            echo "Push rejected (concurrent update); re-syncing and retrying (attempt $attempt)."
            sleep $((RANDOM % 5 + 3))
          done
          echo "::error::Could not push prediction results after 5 attempts."
          exit 1
