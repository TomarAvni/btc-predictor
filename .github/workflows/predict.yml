name: Predict

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install
        run: pip install -r requirements.txt

      - name: Check trained models
        run: |
          if [ ! -d "data/validation/models" ] || [ -z "$(find data/validation/models -type f -print -quit 2>/dev/null)" ]; then
            echo "::warning::No trained models in data/validation/models/ â€” running predict with heuristics only"
            echo "Run Download then Train (or workflow_dispatch Train) to produce ML models."
          else
            echo "Trained model artifacts found in data/validation/models/"
          fi

      - name: Predict
        env:
          BTC_PRICE_PRIMARY_EXCHANGE: bitstamp
        run: python main.py --predict

      - name: Trade
        run: python trade.py --live-tick

      - name: Score mature predictions
        run: python score_predictions.py

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: prediction run [skip ci]"
          git pull --rebase origin master
          git push
