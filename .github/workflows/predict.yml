name: Predict

on:
  schedule:
    # Offset from :00/:30 — GitHub drops/delays schedules at the top of the hour
    # under load, which was leaving the predictor idle for hours.
    - cron: '7,37 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: predict-pipeline
  cancel-in-progress: false

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync to latest master
        run: |
          git fetch origin master
          git reset --hard origin/master

      - name: Check prediction freshness
        id: freshness
        run: |
          python3 -m src.utils.prediction_freshness \
            --event-name "${{ github.event_name }}" \
            --threshold-minutes 25 \
            --output "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        if: github.event_name == 'workflow_dispatch' || steps.freshness.outputs.should_run == 'true'
        with:
          python-version: '3.11'

      - name: Cache pip
        if: github.event_name == 'workflow_dispatch' || steps.freshness.outputs.should_run == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install
        if: github.event_name == 'workflow_dispatch' || steps.freshness.outputs.should_run == 'true'
        run: pip install -r requirements.txt

      - name: Check trained models
        if: github.event_name == 'workflow_dispatch' || steps.freshness.outputs.should_run == 'true'
        run: |
          if [ ! -d "data/validation/models" ] || [ -z "$(find data/validation/models -type f -print -quit 2>/dev/null)" ]; then
            echo "::warning::No trained models in data/validation/models/ - running predict with heuristics only"
            echo "Run Download then Train (or workflow_dispatch Train) to produce ML models."
          else
            echo "Trained model artifacts found in data/validation/models/"
          fi

      - name: Predict
        if: github.event_name == 'workflow_dispatch' || steps.freshness.outputs.should_run == 'true'
        env:
          BTC_PRICE_PRIMARY_EXCHANGE: bitstamp
        run: python main.py --predict

      - name: Trade
        if: github.event_name == 'workflow_dispatch' || steps.freshness.outputs.should_run == 'true'
        run: python trade.py --live-tick

      - name: Score mature predictions
        if: github.event_name == 'workflow_dispatch' || steps.freshness.outputs.should_run == 'true'
        run: python score_predictions.py

      - name: Commit
        if: github.event_name == 'workflow_dispatch' || steps.freshness.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TARGET_BRANCH="master"
          git fetch origin "$TARGET_BRANCH"
          # Union append-only JSONL stores with upstream so concurrent runs
          # never drop newly appended prediction/score rows on push.
          python scripts/recover_pipeline_data.py --git-ref "origin/$TARGET_BRANCH" --no-rescore
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: prediction run [skip ci]"
          RUN_COMMIT=$(git rev-parse HEAD)
          # Rebase replays the whole prediction commit and conflicts on generated
          # JSON/parquet/cache artifacts. Sync onto upstream and merge JSONL instead.
          for attempt in 1 2 3 4 5; do
            git fetch origin "$TARGET_BRANCH" || { echo "Fetch failed; retrying (attempt $attempt)."; sleep $((RANDOM % 5 + 3)); continue; }
            git reset --hard "origin/$TARGET_BRANCH"
            git checkout "$RUN_COMMIT" -- data/ predictions.log
            python scripts/recover_pipeline_data.py \
              --git-ref "origin/$TARGET_BRANCH" \
              --git-ref "$RUN_COMMIT" \
              --no-rescore
            git add -A
            if git diff --staged --quiet; then
              echo "No changes to commit after upstream sync."
              exit 0
            fi
            git commit -m "chore: prediction run [skip ci]"
            if git push origin "HEAD:$TARGET_BRANCH"; then
              echo "Pushed successfully on attempt $attempt."
              exit 0
            fi
            echo "Push rejected (concurrent update); retrying (attempt $attempt)."
            sleep $((RANDOM % 5 + 3))
          done
          echo "::error::Could not push prediction results after 5 attempts."
          exit 1

      - name: Flag Predict failure
        if: failure()
        run: |
          {
            echo "## Predict failed"
            echo ""
            echo "- Run: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            echo "- Branch: $GITHUB_REF_NAME"
            echo "- Commit: $GITHUB_SHA"
            echo ""
            echo "The prediction pipeline failed. Inspect the failed step above before trusting pipeline freshness."
          } | tee predict_failure.md
          tee -a "$GITHUB_STEP_SUMMARY" < predict_failure.md
          echo "::error title=Predict workflow failed::Prediction pipeline failed; see the job summary and predict_failure.md artifact."

      - name: Upload Predict failure marker
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: predict-failure-${{ github.run_id }}
          path: predict_failure.md
          if-no-files-found: ignore
