name: Predict

on:
  schedule:
    # Twice-hourly, offset from :00/:30 — GitHub drops/delays top-of-hour schedules.
    - cron: '7,37 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: predict-pipeline
  cancel-in-progress: false

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install
        run: pip install -r requirements.txt

      - name: Check trained models
        run: |
          if [ ! -d "data/validation/models" ] || [ -z "$(find data/validation/models -type f -print -quit 2>/dev/null)" ]; then
            echo "::warning::No trained models in data/validation/models/ â€” running predict with heuristics only"
            echo "Run Download then Train (or workflow_dispatch Train) to produce ML models."
          else
            echo "Trained model artifacts found in data/validation/models/"
          fi

      - name: Refresh price candles
        env:
          BTC_PRICE_PRIMARY_EXCHANGE: bitstamp
        run: python main.py --download

      - name: Predict
        env:
          BTC_PRICE_PRIMARY_EXCHANGE: bitstamp
          # X/Twitter sentiment module. When these secrets are unset the module
          # runs in mock mode (fixtures) so the pipeline never breaks.
          TWITTERAPI_KEY: ${{ secrets.TWITTERAPI_KEY }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: python main.py --predict

      - name: Trade
        run: python trade.py --live-tick

      - name: Score mature predictions
        run: python score_predictions.py

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TARGET_BRANCH="master"
          git fetch origin "$TARGET_BRANCH"
          # Union append-only JSONL stores with upstream so concurrent hourly
          # runs never drop newly appended prediction/score rows on rebase.
          python scripts/recover_pipeline_data.py --git-ref "origin/$TARGET_BRANCH" --no-rescore
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: prediction run [skip ci]"
          # Pipeline artifacts (predictions, scores, labeled store, trading)
          # must always land on master so the dashboard and closed-loop trainer
          # read a single canonical history regardless of dispatch branch.
          for attempt in 1 2 3 4 5; do
            git fetch origin "$TARGET_BRANCH" || { echo "Fetch failed; retrying (attempt $attempt)."; sleep $((RANDOM % 5 + 3)); continue; }
            python scripts/recover_pipeline_data.py --git-ref "origin/$TARGET_BRANCH" --no-rescore || true
            git add data/predictions/predictions.jsonl data/performance/prediction_scores.jsonl data/training_data/labeled.jsonl
            if ! git diff --staged --quiet; then
              git commit --amend --no-edit
            fi
            # recover_pipeline_data may refresh derived JSON performance files;
            # discard unstaged artifacts so rebase is not blocked.
            git reset --hard HEAD
            if ! git rebase "origin/$TARGET_BRANCH"; then
              echo "Rebase hit an unexpected state; aborting and retrying (attempt $attempt)."
              git rebase --abort || true
              sleep $((RANDOM % 5 + 3))
              continue
            fi
            if git push origin "HEAD:$TARGET_BRANCH"; then
              echo "Pushed successfully on attempt $attempt."
              exit 0
            fi
            echo "Push rejected (concurrent update); re-syncing and retrying (attempt $attempt)."
            sleep $((RANDOM % 5 + 3))
          done
          echo "::error::Could not push prediction results after 5 attempts."
          exit 1
