name: Predict

on:
  schedule:
    # Twice-hourly, offset from :00/:30 — GitHub drops/delays top-of-hour schedules
    # under load, which was leaving the predictor idle for hours.
    - cron: '7,37 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: predict-pipeline
  cancel-in-progress: false

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync to latest master
        run: |
          git fetch origin master
          git reset --hard origin/master

      - name: Check prediction freshness
        id: freshness
        run: |
          python3 -m src.utils.prediction_freshness \
            --event-name "${{ github.event_name }}" \
            --threshold-minutes 25 \
            --output "$GITHUB_OUTPUT"

      - name: Check prediction freshness
        id: freshness
        run: |
          python3 -m src.utils.prediction_freshness \
            --event-name "${{ github.event_name }}" \
            --threshold-minutes 25 \
            --output "$GITHUB_OUTPUT"

      - uses: actions/setup-python@v5
        if: github.event_name == 'workflow_dispatch' || steps.freshness.outputs.should_run == 'true'
        with:
          python-version: '3.11'

      - name: Cache pip
        if: github.event_name == 'workflow_dispatch' || steps.freshness.outputs.should_run == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install
        if: github.event_name == 'workflow_dispatch' || steps.freshness.outputs.should_run == 'true'
        run: pip install -r requirements.txt

      - name: Check trained models
        if: github.event_name == 'workflow_dispatch' || steps.freshness.outputs.should_run == 'true'
        run: |
          if [ ! -d "data/validation/models" ] || [ -z "$(find data/validation/models -type f -print -quit 2>/dev/null)" ]; then
            echo "::warning::No trained models in data/validation/models/ — running predict with heuristics only"
            echo "Run Download then Train (or workflow_dispatch Train) to produce ML models."
          else
            echo "Trained model artifacts found in data/validation/models/"
          fi

      - name: Predict
        if: github.event_name == 'workflow_dispatch' || steps.freshness.outputs.should_run == 'true'
        env:
          BTC_PRICE_PRIMARY_EXCHANGE: bitstamp
        run: python main.py --predict

      - name: Trade
        if: github.event_name == 'workflow_dispatch' || steps.freshness.outputs.should_run == 'true'
        run: python trade.py --live-tick

      - name: Score mature predictions
        if: github.event_name == 'workflow_dispatch' || steps.freshness.outputs.should_run == 'true'
        run: python score_predictions.py

      - name: Commit
        if: github.event_name == 'workflow_dispatch' || steps.freshness.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git restore data/cache || true
          git add predictions.log data/predictions/ data/performance/ data/price/ data/trading/
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: prediction run [skip ci]"
          # Resilient push: re-sync and retry so concurrent runs / data-file
          # conflicts self-heal instead of failing the whole prediction run.
          resolve_generated_conflicts() {
            local conflicts
            conflicts="$(git diff --name-only --diff-filter=U)"
            if [ -z "$conflicts" ]; then
              return 1
            fi

            for path in $conflicts; do
              case "$path" in
                data/performance/*|data/predictions/*|data/price/*|data/trading/*|predictions.log)
                  git checkout --theirs -- "$path"
                  git add -- "$path"
                  ;;
                *)
                  echo "Unrecognized conflict path: $path"
                  return 1
                  ;;
              esac
            done

            GIT_EDITOR=true git rebase --continue
          }

          for attempt in 1 2 3 4 5; do
            git fetch origin master || { echo "Fetch failed; retrying (attempt $attempt)."; sleep $((RANDOM % 5 + 3)); continue; }
            if ! git rebase -X theirs origin/master; then
              echo "Rebase conflicted; resolving generated data files (attempt $attempt)."
              if ! resolve_generated_conflicts; then
                echo "Rebase hit an unexpected state; aborting and retrying (attempt $attempt)."
                git rebase --abort || true
                sleep $((RANDOM % 5 + 3))
                continue
              fi
            fi
            if ! git rebase -X theirs "origin/$TARGET_BRANCH"; then
              echo "Rebase hit conflicts; preferring replayed commit and continuing (attempt $attempt)."
              if [ -d .git/rebase-merge ] || [ -d .git/rebase-apply ]; then
                while IFS= read -r conflicted; do
                  [ -n "$conflicted" ] || continue
                  git checkout --theirs -- "$conflicted" || true
                  git add -- "$conflicted" || true
                done < <(git diff --name-only --diff-filter=U)
                if ! GIT_EDITOR=true git rebase --continue; then
                  echo "Could not continue rebase; aborting and retrying (attempt $attempt)."
                  git rebase --abort || true
                  sleep $((RANDOM % 5 + 3))
                  continue
                fi
              else
                git rebase --abort || true
                sleep $((RANDOM % 5 + 3))
                continue
              fi
            fi
            if git push origin "HEAD:$TARGET_BRANCH"; then
              echo "Pushed successfully on attempt $attempt."
              exit 0
            fi
            echo "Push rejected (concurrent update); re-syncing and retrying (attempt $attempt)."
            sleep $((RANDOM % 5 + 3))
          done
          echo "::error::Could not push prediction results after 5 attempts."
          exit 1
