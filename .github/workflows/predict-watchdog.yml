name: Predict Watchdog

on:
  schedule:
    # GitHub scheduled workflows can be delayed or dropped. This watchdog
    # checks the committed prediction log every 15 minutes and restarts Predict
    # when no run has landed in the last 50 minutes.
    - cron: '12,27,42,57 * * * *'
  workflow_dispatch:
  workflow_run:
    # Re-check freshness after each Predict run when cron schedules are dropped.
    workflows: ["Predict"]
    types: [completed]

permissions:
  actions: write
  contents: read

concurrency:
  group: predict-watchdog
  cancel-in-progress: false

jobs:
  watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Check prediction log freshness
        id: freshness
        run: |
          # Run as a script (not `python -m`) so src.utils.__init__ does not
          # import PyYAML before requirements are installed on the runner.
          if python3 src/utils/prediction_freshness.py --max-age-hours 0.84; then
            echo "stale=false" >> "$GITHUB_OUTPUT"
          else
            echo "stale=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check active Predict runs
        id: active
        if: steps.freshness.outputs.stale == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          queued=$(gh run list --workflow predict.yml --status queued --json databaseId --jq 'length')
          running=$(gh run list --workflow predict.yml --status in_progress --json databaseId --jq 'length')
          active=$((queued + running))
          echo "count=$active" >> "$GITHUB_OUTPUT"
          if [ "$active" -gt 0 ]; then
            echo "Predict already has $active queued/running run(s); not dispatching another."
          fi

      - name: Dispatch Predict recovery run
        if: steps.freshness.outputs.stale == 'true' && steps.active.outputs.count == '0'
        env:
          GH_TOKEN: ${{ github.token }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          gh workflow run predict.yml --ref "$DEFAULT_BRANCH"
          echo "Prediction log was stale; dispatched Predict on $DEFAULT_BRANCH."
