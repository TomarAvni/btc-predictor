name: Predict Watchdog

on:
  schedule:
    # Recovery loop for missed Predict schedules. GitHub scheduled workflows are
    # best-effort, so this checks the committed prediction artifact hourly.
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: predict-pipeline
  cancel-in-progress: false

jobs:
  watchdog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check prediction freshness
        id: freshness
        continue-on-error: true
        run: python -m src.utils.prediction_freshness --path predictions.log --max-age-hours 3

      - name: Check for active Predict runs
        id: active
        if: steps.freshness.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          queued=$(gh api --method GET "repos/${REPOSITORY}/actions/workflows/predict.yml/runs" \
            -f status=queued \
            -f per_page=1 \
            --jq '.total_count')
          running=$(gh api --method GET "repos/${REPOSITORY}/actions/workflows/predict.yml/runs" \
            -f status=in_progress \
            -f per_page=1 \
            --jq '.total_count')
          active=$((queued + running))
          echo "active=${active}" >> "$GITHUB_OUTPUT"
          echo "Queued Predict runs: ${queued}; in-progress Predict runs: ${running}"

      - name: Dispatch Predict recovery run
        if: steps.freshness.outcome == 'failure' && steps.active.outputs.active == '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run predict.yml --ref master

      - name: Report active Predict run
        if: steps.freshness.outcome == 'failure' && steps.active.outputs.active != '0'
        run: echo "Prediction log is stale, but a Predict run is already queued or in progress."
