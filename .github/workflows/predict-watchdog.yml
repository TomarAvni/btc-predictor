name: Predict Watchdog

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: predict-pipeline
  cancel-in-progress: false

jobs:
  dispatch-if-stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check prediction freshness
        id: freshness
        continue-on-error: true
        run: python -m src.utils.prediction_freshness --max-age-hours 3

      - name: Check active Predict runs
        id: active
        if: steps.freshness.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
        run: |
          queued=$(gh api "repos/${REPOSITORY}/actions/workflows/predict.yml/runs" -f branch=master -f status=queued --jq '.total_count')
          running=$(gh api "repos/${REPOSITORY}/actions/workflows/predict.yml/runs" -f branch=master -f status=in_progress --jq '.total_count')
          total=$((queued + running))
          echo "active=$total" >> "$GITHUB_OUTPUT"
          echo "Predict queued/running runs: $total"

      - name: Dispatch Predict recovery run
        if: steps.freshness.outcome == 'failure' && steps.active.outputs.active == '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run predict.yml --ref master

      - name: Report fresh pipeline
        if: steps.freshness.outcome == 'success'
        run: echo "Prediction pipeline is fresh; no watchdog action needed."

      - name: Report active Predict run
        if: steps.freshness.outcome == 'failure' && steps.active.outputs.active != '0'
        run: echo "Prediction pipeline is stale, but a Predict run is already queued or running."
