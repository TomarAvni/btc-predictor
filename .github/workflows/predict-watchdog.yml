name: Predict Watchdog

on:
  schedule:
    # Offset from Predict (7,37) so stale recovery runs even when GitHub skips schedules.
    - cron: '17,47 * * * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: predict-pipeline
  cancel-in-progress: false

jobs:
  recover-stale-predict:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check prediction freshness
        id: freshness
        continue-on-error: true
        run: python -m src.utils.prediction_freshness --max-age-hours 1

      - name: Check for active Predict runs
        id: active
        if: steps.freshness.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          queued="$(gh api \
            --method GET \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/actions/workflows/predict.yml/runs" \
            -f status=queued \
            --jq '.total_count')"
          in_progress="$(gh api \
            --method GET \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/actions/workflows/predict.yml/runs" \
            -f status=in_progress \
            --jq '.total_count')"
          active_count=$((queued + in_progress))
          echo "active_count=$active_count" >> "$GITHUB_OUTPUT"
          echo "Active Predict runs: $active_count"

      - name: Dispatch Predict recovery run
        if: steps.freshness.outcome == 'failure' && steps.active.outputs.active_count == '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "Prediction log is stale; dispatching Predict."
          gh workflow run predict.yml --ref master

      - name: Report fresh prediction pipeline
        if: steps.freshness.outcome == 'success'
        run: echo "Prediction pipeline is fresh (no recovery needed)."

      - name: Report active prediction pipeline
        if: steps.freshness.outcome == 'failure' && steps.active.outputs.active_count != '0'
        run: echo "Prediction pipeline is stale, but a Predict run is already queued or in progress."
