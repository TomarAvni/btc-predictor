name: Predict Watchdog

on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: predict-pipeline
  cancel-in-progress: false

jobs:
  recover-stale-predict:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check prediction freshness
        id: freshness
        run: |
          set +e
          python -m src.utils.prediction_freshness --max-age-hours 3
          status=$?
          set -e

          if [ "$status" -eq 0 ]; then
            echo "fresh=true" >> "$GITHUB_OUTPUT"
          else
            echo "fresh=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for active Predict runs
        id: active
        if: steps.freshness.outputs.fresh == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          active_count=0
          for status in queued in_progress waiting pending requested; do
            count="$(
              gh api \
                --method GET \
                "repos/${{ github.repository }}/actions/workflows/predict.yml/runs" \
                -f branch=master \
                -f status="$status" \
                -q '.total_count'
            )"
            active_count=$((active_count + count))
          done
          echo "active_count=$active_count" >> "$GITHUB_OUTPUT"
          echo "Active Predict runs: $active_count"

      - name: Dispatch Predict recovery run
        if: steps.freshness.outputs.fresh == 'false' && steps.active.outputs.active_count == '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run predict.yml --ref master

      - name: Skip recovery because Predict is already active
        if: steps.freshness.outputs.fresh == 'false' && steps.active.outputs.active_count != '0'
        run: echo "Predict output is stale, but a Predict run is already queued or running."
