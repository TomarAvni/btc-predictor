name: Predict Watchdog

on:
  schedule:
    # GitHub scheduled workflows can be delayed or dropped. Offset from Predict
    # (:07/:37) and Pipeline Watchdog (:13/:28/:43/:58) for independent coverage.
    - cron: '3,18,33,48 * * * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: predict-watchdog
  cancel-in-progress: false

jobs:
  watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check prediction log freshness
        id: freshness
        run: |
          # Run the script directly so package __init__ does not pull in yaml.
          set +e
          python src/utils/prediction_freshness.py --max-age-hours 1
          exit_code=$?
          set -e
          if [ "$exit_code" -eq 0 ]; then
            echo "stale=false" >> "$GITHUB_OUTPUT"
          elif [ "$exit_code" -eq 1 ]; then
            echo "stale=true" >> "$GITHUB_OUTPUT"
          else
            echo "::error::prediction freshness check failed with exit $exit_code"
            exit "$exit_code"
          fi

      - name: Check active Predict runs
        id: active
        if: steps.freshness.outputs.stale == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          queued=$(gh run list --workflow predict.yml --status queued --json databaseId --jq 'length')
          running=$(gh run list --workflow predict.yml --status in_progress --json databaseId --jq 'length')
          active=$((queued + running))
          echo "count=$active" >> "$GITHUB_OUTPUT"
          if [ "$active" -gt 0 ]; then
            echo "Predict already has $active queued/running run(s); not dispatching another."
          fi

      - name: Dispatch Predict recovery run
        if: steps.freshness.outputs.stale == 'true' && steps.active.outputs.count == '0'
        env:
          GH_TOKEN: ${{ github.token }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          gh workflow run predict.yml --ref "$DEFAULT_BRANCH"
          echo "Prediction log was stale; dispatched Predict on $DEFAULT_BRANCH."
