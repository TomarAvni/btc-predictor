name: Predict Watchdog

on:
  schedule:
    # Independent hourly safety net for missed/delayed Predict schedules.
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: predict-pipeline
  cancel-in-progress: false

jobs:
  watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Check prediction freshness
        id: freshness
        run: python3 -m src.utils.prediction_freshness --max-age-hours 3 --github-output

      - uses: actions/setup-python@v5
        if: steps.freshness.outputs.stale == 'true'
        with:
          python-version: '3.11'

      - name: Cache pip
        if: steps.freshness.outputs.stale == 'true'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install
        if: steps.freshness.outputs.stale == 'true'
        run: pip install -r requirements.txt

      - name: Check trained models
        if: steps.freshness.outputs.stale == 'true'
        run: |
          if [ ! -d "data/validation/models" ] || [ -z "$(find data/validation/models -type f -print -quit 2>/dev/null)" ]; then
            echo "::warning::No trained models in data/validation/models/ - running predict with heuristics only"
            echo "Run Download then Train (or workflow_dispatch Train) to produce ML models."
          else
            echo "Trained model artifacts found in data/validation/models/"
          fi

      - name: Predict
        if: steps.freshness.outputs.stale == 'true'
        env:
          BTC_PRICE_PRIMARY_EXCHANGE: bitstamp
        run: python main.py --predict

      - name: Trade
        if: steps.freshness.outputs.stale == 'true'
        run: python trade.py --live-tick

      - name: Score mature predictions
        if: steps.freshness.outputs.stale == 'true'
        run: python score_predictions.py

      - name: Commit
        if: steps.freshness.outputs.stale == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "chore: watchdog prediction run [skip ci]"
          for attempt in 1 2 3 4 5; do
            git fetch origin master || { echo "Fetch failed; retrying (attempt $attempt)."; sleep $((RANDOM % 5 + 3)); continue; }
            if ! git rebase -X theirs origin/master; then
              echo "Rebase hit an unexpected state; aborting and retrying (attempt $attempt)."
              git rebase --abort || true
              sleep $((RANDOM % 5 + 3))
              continue
            fi
            if git push origin HEAD:master; then
              echo "Pushed successfully on attempt $attempt."
              exit 0
            fi
            echo "Push rejected (concurrent update); re-syncing and retrying (attempt $attempt)."
            sleep $((RANDOM % 5 + 3))
          done
          echo "::error::Could not push watchdog prediction results after 5 attempts."
          exit 1
