name: Predict Watchdog

on:
  schedule:
    # GitHub scheduled workflows can be delayed or dropped. This watchdog
    # checks the committed prediction log twice hourly and restarts Predict
    # when predictions.log is older than 1 hour.
    - cron: '17,47 * * * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: predict-pipeline
  cancel-in-progress: false

jobs:
  watchdog:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check prediction log freshness
        id: freshness
        run: |
          if python -m src.utils.prediction_freshness --max-age-hours 1; then
            echo "stale=false" >> "$GITHUB_OUTPUT"
          else
            echo "stale=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check active Predict runs
        id: active
        if: steps.freshness.outputs.stale == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          active_count="$(
            gh api \
              -H "Accept: application/vnd.github+json" \
              "/repos/${GITHUB_REPOSITORY}/actions/runs?branch=${{ github.event.repository.default_branch }}&per_page=100" \
              --jq '[.workflow_runs[] | select(.name == "Predict" and (.status == "queued" or .status == "in_progress" or .status == "waiting" or .status == "pending" or .status == "requested"))] | length'
          )"
          echo "count=${active_count}" >> "$GITHUB_OUTPUT"
          echo "Active Predict runs on default branch: ${active_count}"

      - name: Dispatch Predict recovery run
        if: steps.freshness.outputs.stale == 'true' && steps.active.outputs.count == '0'
        env:
          GH_TOKEN: ${{ github.token }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          gh workflow run predict.yml --ref "$DEFAULT_BRANCH"
          echo "Prediction log was stale; dispatched Predict on $DEFAULT_BRANCH."
