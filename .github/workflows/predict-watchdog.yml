name: Predict Watchdog

on:
  schedule:
    # Recovery check for missed Predict schedules. It only dispatches Predict
    # when the committed prediction log is more than three hours old.
    - cron: '17 * * * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: predict-watchdog
  cancel-in-progress: true

jobs:
  recover-stale-predict:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check prediction log freshness
        id: freshness
        continue-on-error: true
        run: python -m src.utils.prediction_freshness --max-age-hours 3

      - name: Check active Predict runs
        id: active
        if: steps.freshness.outcome == 'failure'
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          active_runs=0
          for status in queued in_progress waiting pending requested; do
            count="$(
              gh api \
                --method GET \
                "repos/${REPO}/actions/workflows/predict.yml/runs" \
                -f status="${status}" \
                -f per_page=100 \
                --jq '.total_count'
            )"
            echo "${status}=${count}"
            active_runs=$((active_runs + count))
          done
          echo "active_runs=${active_runs}" >> "$GITHUB_OUTPUT"

      - name: Dispatch Predict recovery run
        if: steps.freshness.outcome == 'failure' && steps.active.outputs.active_runs == '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh workflow run predict.yml --ref master
          echo "Prediction log is stale; dispatched Predict recovery run."

      - name: Skip dispatch because Predict is active
        if: steps.freshness.outcome == 'failure' && steps.active.outputs.active_runs != '0'
        run: echo "Prediction log is stale, but a Predict run is already queued or running."
