name: Pipeline Watchdog

on:
  schedule:
    # Independent guard for missed/delayed Predict schedules. Offsets from
    # predict-watchdog (:04/:19/:34/:49) so at least one freshness check
    # fires when GitHub drops scheduled workflow slots.
    - cron: '11,26,41,56 * * * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: pipeline-watchdog
  cancel-in-progress: false

jobs:
  predict-freshness:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check prediction log freshness
        id: freshness
        run: |
          if python -m src.utils.prediction_freshness --max-age-minutes 45; then
            echo "stale=false" >> "$GITHUB_OUTPUT"
          else
            echo "stale=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check active Predict runs
        id: active
        if: steps.freshness.outputs.stale == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          queued=$(gh run list --workflow predict.yml --status queued --json databaseId --jq 'length')
          running=$(gh run list --workflow predict.yml --status in_progress --json databaseId --jq 'length')
          active=$((queued + running))
          echo "count=$active" >> "$GITHUB_OUTPUT"
          if [ "$active" -gt 0 ]; then
            echo "Predict already has $active queued/running run(s); not dispatching another."
          fi

      - name: Dispatch Predict if stale
        if: steps.freshness.outputs.stale == 'true' && steps.active.outputs.count == '0'
        env:
          GH_TOKEN: ${{ github.token }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          gh workflow run predict.yml --ref "$DEFAULT_BRANCH"
          echo "Prediction log was stale; dispatched Predict on $DEFAULT_BRANCH."
