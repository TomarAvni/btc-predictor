name: Pipeline Watchdog

on:
  schedule:
    # Independent guard for missed/delayed Predict schedules.
    - cron: '13,28,43,58 * * * *'
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/pipeline-watchdog.yml'
      - '.github/workflows/predict-watchdog.yml'
      - 'src/utils/prediction_freshness.py'

permissions:
  actions: write
  contents: read

concurrency:
  group: pipeline-watchdog
  cancel-in-progress: false

jobs:
  predict-freshness:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Check prediction log freshness
        id: freshness
        run: |
          if python3 src/utils/prediction_freshness.py --max-age-minutes 60; then
            echo "stale=false" >> "$GITHUB_OUTPUT"
          else
            echo "stale=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Check active Predict runs
        id: active
        if: steps.freshness.outputs.stale == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          queued=$(gh run list --workflow predict.yml --status queued --json databaseId --jq 'length')
          running=$(gh run list --workflow predict.yml --status in_progress --json databaseId --jq 'length')
          active=$((queued + running))
          echo "count=$active" >> "$GITHUB_OUTPUT"
          if [ "$active" -gt 0 ]; then
            echo "Predict already has $active queued/running run(s); not dispatching another."
          fi

      - name: Dispatch Predict recovery run
        if: steps.freshness.outputs.stale == 'true' && steps.active.outputs.count == '0'
        env:
          GH_TOKEN: ${{ github.token }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          gh workflow run predict.yml --ref "$DEFAULT_BRANCH"
          echo "Prediction log was stale; dispatched Predict on $DEFAULT_BRANCH."
