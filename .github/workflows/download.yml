name: Download

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install
        run: pip install -r requirements.txt

      - name: Download
        env:
          BTC_PRICE_PRIMARY_EXCHANGE: bitstamp
        run: python main.py --download

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/price/
          git diff --staged --quiet || git commit -m "chore: price history [skip ci]"
          git pull --rebase -X theirs origin master
          git push
