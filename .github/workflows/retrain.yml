name: Retrain

on:
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  retrain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install
        run: pip install -r requirements.txt

      - name: Incremental price update
        env:
          BTC_PRICE_PRIMARY_EXCHANGE: bitstamp
        run: python main.py --download

      - name: Score mature predictions
        run: python score_predictions.py

      - name: Train and validate
        run: python validate.py --split 0.8 --output data/validation/ --skip-tft

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/validation/ data/performance/ data/price/
          git diff --staged --quiet || git commit -m "chore: weekly retrain and performance update [skip ci]"
          git pull --rebase origin master
          git push
